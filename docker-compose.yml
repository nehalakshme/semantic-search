version: "3.8"

services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.1
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    volumes:
      - esdata:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 20
      start_period: 40s
    networks:
      - docusearch

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: docusearch
      POSTGRES_USER: docusearch
      POSTGRES_PASSWORD: docusearch
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U docusearch"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - docusearch

  backend:
    build: ./backend
    depends_on:
      elasticsearch:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      - ELASTICSEARCH_URL=http://elasticsearch:9200
      - DATABASE_URL=postgresql://docusearch:docusearch@postgres:5432/docusearch
      - UPLOAD_MAX_SIZE_MB=50
    ports:
      - "8000:8000"
    networks:
      - docusearch

  frontend:
    build: ./frontend
    depends_on:
      - backend
    ports:
      - "3000:80"
    networks:
      - docusearch

volumes:
  esdata:
  pgdata:

networks:
  docusearch:
    driver: bridge
